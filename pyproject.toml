[project]
name = "convert-python-sdk"
version = "0.1.0"
description = "Framework-agnostic Python SDK scaffold for Convert."
readme = "README.md"
authors = [
    { name = "Usman Abbas", email = "usman.abbas7@gmail.com" }
]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.28,<0.29",
]

[project.urls]
Homepage = "https://github.com/convertcom/python-sdk"
Repository = "https://github.com/convertcom/python-sdk"
Issues = "https://github.com/convertcom/python-sdk/issues"
Changelog = "https://github.com/convertcom/python-sdk/blob/main/CHANGELOG.md"

[dependency-groups]
dev = [
    "pytest>=8.4,<9",
    "pytest-cov>=5,<7",
    "ruff>=0.6,<0.9",
    "mypy>=1.11,<2",
    "towncrier>=24.8,<26",
]

[build-system]
requires = ["hatchling>=1.29,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/convert_sdk"]

[tool.hatch.build.targets.wheel.force-include]
"src/convert_sdk/py.typed" = "convert_sdk/py.typed"

[tool.hatch.build.targets.sdist]
include = [
    "README.md",
    "CHANGELOG.md",
    "examples/**/*.py",
    "src/convert_sdk/**/*.py",
    "src/convert_sdk/py.typed",
    "tests/**/*.py",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "parity: cross-SDK parity tests against checked-in JavaScript reference vectors",
]

[tool.ruff]
line-length = 100
target-version = "py39"
src = ["src", "tests", "scripts", "examples"]
extend-exclude = [".venv", "dist", "build"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long — formatter handles long lines
    "SIM108", # ternary preference — clarity over compactness
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B011"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.9"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
files = ["src/convert_sdk"]

[[tool.mypy.overrides]]
module = ["tests.*", "scripts.*", "examples.*"]
ignore_errors = true

[tool.coverage.run]
source = ["convert_sdk"]
branch = false
omit = [
    "src/convert_sdk/version.py",
    "tests/*",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@overload",
]

[tool.towncrier]
package = "convert_sdk"
package_dir = "src"
directory = "changes"
filename = "CHANGELOG.md"
title_format = "## [{version}] - {project_date}"
issue_format = "[#{issue}](https://github.com/convertcom/python-sdk/issues/{issue})"
underlines = ["", "", ""]
start_string = "<!-- towncrier release notes start -->\n"

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

[[tool.towncrier.type]]
directory = "bugfix"
name = "Bug Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecation"
name = "Deprecations"
showcontent = true

[[tool.towncrier.type]]
directory = "internal"
name = "Internal"
showcontent = true
